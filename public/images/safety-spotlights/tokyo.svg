<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Tokyo safety intelligence">
  <defs>
    <linearGradient id="bg-tokyo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f7f2"/>
      <stop offset="100%" stop-color="#ebe4d8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-tokyo)"/>
  <!-- City mood: Fuji + torii + rising sun (soft line art, right-weighted so title stays clear) -->
  <g fill="none" stroke="#4a6d5c" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="1088" cy="148" r="38"/>
    <path d="M 720 448 Q 880 268 1040 448"/>
    <path d="M 900 446 L 900 528 M 1048 446 L 1048 528 M 878 446 Q 974 408 1070 446"/>
    <path d="M 862 446 Q 974 422 1086 446"/>
  </g>
  <g stroke="#4a6d5c" stroke-opacity="0.1" stroke-width="1">
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="675"/>
    <line x1="1080" y1="0" x2="1080" y2="675"/>
  </g>
  <!-- Gentle “note” marker (not a harsh warning) -->
  <g transform="translate(96 96)">
    <circle r="24" fill="#4a6d5c" fill-opacity="0.06" stroke="#4a6d5c" stroke-opacity="0.22" stroke-width="1.25"/>
    <text x="0" y="7" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="600" fill="#4a6d5c" fill-opacity="0.55">i</text>
  </g>
  <!-- Light insight bars -->
  <g transform="translate(160 248)" fill="#4a6d5c" fill-opacity="0.14">
    <rect x="0" y="48" width="20" height="64" rx="4"/>
    <rect x="36" y="28" width="20" height="84" rx="4"/>
    <rect x="72" y="8" width="20" height="104" rx="4"/>
  </g>
  <text x="600" y="410" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="600" fill="#1a1a1a">Tokyo</text>
  <text x="600" y="472" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.22em" fill="#4a6d5c" fill-opacity="0.85">SAFETY INTELLIGENCE</text>
</svg>
